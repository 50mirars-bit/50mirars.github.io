<!DOCTYPE html>
<html lang="en">
<head>

<title>Couple Watches | 50 Mirars</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f3ee;
    color:#111;
}

/* Back Button */

.back-btn{
    display:inline-block;
    margin:25px 0 0 45px;
    background:#111;
    color:#fff;
    text-decoration:none;
    padding:15px 28px;
    border-radius:8px;
    font-size:20px;
    font-weight:600;
    transition:.3s;
}

.back-btn:hover{
    background:#c9a24d;
}

/* Header Section */

.page-header{
    text-align:center;
    padding:120px 20px 80px;
}

.page-header h1{
    font-size:78px;
    font-weight:700;
    margin-bottom:25px;
}

/* Gold Divider */

.divider{
    width:200px;
    height:20px;
    margin:0 auto 35px;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:85px;
    height:2px;
    background:#c9a24d;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

.divider span{
    position:absolute;
    left:50%;
    top:50%;
    width:14px;
    height:14px;
    background:#c9a24d;
    transform:translate(-50%,-50%) rotate(45deg);
}

.page-header p{
    font-size:22px;
    color:#555;
}

/* Coming Soon Section */

.coming-soon{
    text-align:center;
    padding:40px 20px 120px;
}

.coming-soon h2{
    font-size:40px;
    color:#c9a24d;
    margin-bottom:15px;
    font-family:Georgia, serif;
}

.coming-soon p{
    font-size:20px;
    color:#666;
}

/* Mobile */

@media(max-width:768px){

.page-header{
    padding:80px 20px 50px;
}

.page-header h1{
    font-size:48px;
}

.page-header p{
    font-size:18px;
}

.back-btn{
    margin:20px;
    font-size:16px;
}

}
/* PRODUCTS GRID */

.products-grid{
    width:90%;
    max-width:1400px;
    margin:50px auto 100px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:35px;
}

.product-card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-8px);
}

.product-card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.product-card h3{
    padding:20px 20px 10px;
    font-size:28px;
}

.price{
    padding:0 20px;
    font-size:36px;
    font-weight:bold;
    color:#c9a24d;
}

.enquire-btn{
    display:block;
    margin:20px;
    text-align:center;
    background:#111;
    color:white;
    text-decoration:none;
    padding:15px;
    border-radius:8px;
    font-weight:600;
    transition:.3s;
}

.enquire-btn:hover{
    background:#c9a24d;
    color:black;
}

/* Mobile */

@media(max-width:1000px){
    .products-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:700px){
    .products-grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>
