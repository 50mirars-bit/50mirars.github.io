<!DOCTYPE html>
<html>
<head>
<title>Watches | 50 Mirars</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f1ea;
}

.page-title{
    text-align:center;
    padding:60px 20px;
}

.page-title h1{
    font-size:48px;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:30px;
    max-width:1200px;
    margin:auto;
    padding:40px;
}

.product-card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.product-card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.product-card h3{
    margin-top:20px;
}

.product-card p{
    color:#666;
}

.product-card a{
    display:inline-block;
    margin:20px;
    padding:12px 25px;
    background:#c9a24d;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="page-title">
    <h1>Luxury Watches</h1>
</div>

<div class="product-grid">

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?q=80&w=1200" alt="Rolex">

        <h3>Rolex</h3>

        <p>Premium Luxury Watch</p>

        <a href="https://wa.me/918209989013">
            Enquire Now
        </a>
    </div>

    <div class="product-card">
        <img src="tissot prx.png" alt="Tissot PRX">

        <h3>Tissot PRX</h3>

        <p>Premium Luxury Watch</p>

        <a href="https://wa.me/918209989013">
            Enquire Now
        </a>
    </div>

</div>

</body>
</html>
