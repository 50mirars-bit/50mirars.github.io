<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watches Collection | 50 Mirars</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f1ea;
}

.home-btn{
    display:inline-block;
    background:#111;
    color:white;
    text-decoration:none;
    padding:12px 25px;
    border-radius:6px;
    font-weight:600;
}

.page-title{
    text-align:center;
    padding:60px 20px;
}

.page-title h1{
    font-size:60px;
    color:#111;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    max-width:1400px;
    margin:auto;
    padding:40px;
}

.product-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.product-card img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.product-card h3{
    margin-top:20px;
}

.price{
    color:#c9a24d;
    font-size:22px;
    font-weight:bold;
}

.enquire-btn{
    display:inline-block;
    margin:20px;
    padding:12px 25px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.enquire-btn:hover{
    background:#c9a24d;
    color:black;
}

</style>
</head>

<body>

<div style="padding:20px;">
    <a href="index.html" class="home-btn">← Back to Home</a>
</div>

<div class="page-title">
    <h1>Watches Collection</h1>
</div>

<div class="product-grid">

<!-- Products will go here -->

</div>

</body>
</html>
