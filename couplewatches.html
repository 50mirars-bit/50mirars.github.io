<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Couple Watches | 50 Mirars</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f3ee;
    color:#111;
}

/* BACK BUTTON */

.back-btn{
    display:inline-block;
    margin:30px 50px;
    background:#111;
    color:#fff;
    text-decoration:none;
    padding:14px 28px;
    border-radius:8px;
    font-weight:600;
    transition:.3s;
}

.back-btn:hover{
    background:#c9a24d;
    color:#111;
}

/* PAGE HEADER */

.page-header{
    text-align:center;
    padding:40px 20px 80px;
}

.page-header h1{
    font-size:72px;
    margin-bottom:20px;
    font-family:Georgia,serif;
}

.divider{
    width:220px;
    margin:0 auto 25px;
    position:relative;
    height:20px;
}

.divider:before,
.divider:after{
    content:"";
    position:absolute;
    top:50%;
    width:90px;
    height:2px;
    background:#c9a24d;
}

.divider:before{
    left:0;
}

.divider:after{
    right:0;
}

.divider span{
    position:absolute;
    left:50%;
    top:50%;
    width:14px;
    height:14px;
    background:#c9a24d;
    transform:translate(-50%,-50%) rotate(45deg);
}

.page-header p{
    color:#666;
    font-size:22px;
}

/* PRODUCTS */

.products-grid{
    width:90%;
    max-width:1400px;
    margin:0 auto 100px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:35px;
}

.product-card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-8px);
}

.product-card img{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.product-info{
    padding:20px;
}

.product-info h3{
    font-size:24px;
    margin-bottom:10px;
}

.price{
    color:#c9a24d;
    font-size:34px;
    font-weight:bold;
    margin-bottom:20px;
}

.enquire-btn{
    display:block;
    text-align:center;
    background:#111;
    color:#fff;
    text-decoration:none;
    padding:14px;
    border-radius:8px;
    font-weight:600;
    transition:.3s;
}

.enquire-btn:hover{
    background:#c9a24d;
    color:#111;
}

/* MOBILE */

@media(max-width:1000px){

.products-grid{
    grid-template-columns:repeat(2,1fr);
}

.page-header h1{
    font-size:54px;
}

}

@media(max-width:700px){

.products-grid{
    grid-template-columns:1fr;
}

.page-header h1{
    font-size:40px;
}

.page-header p{
    font-size:18px;
}

.back-btn{
    margin:20px;
}

}

</style>
</head>

<body>

<a href="watches.html" class="back-btn">
← Back to Watches
</a>

<section class="page-header">

<h1>Couple Watches</h1>

<div class="divider">
<span></span>
</div>

<p>Luxury matching watches crafted for couples.</p>

</section>

<div class="products-grid">

<!-- PASTE PRODUCTS HERE -->

<div class="product-card">
    <img src="Cartier Santos Dumont Couple Watch.jpeg" alt="Cartier Santos Dumont Couple Watch">

    <h3>Cartier Santos Dumont Couple Watch</h3>

    <div class="price">₹4,500</div>

    <a class="enquire-btn"
       href="https://api.whatsapp.com/send?phone=918209989013&text=Hello%2050%20Mirars,%20I%20am%20interested%20in%20Cartier%20Santos%20Dumont%20Couple%20Watch.">
       Enquire Now
    </a>
</div>

<div class="product-card">
    <img src="Tissot Gentel Couple Watch.jpeg" alt="Tissot Gentel Couple Watch">

    <h3>Tissot Gentel Couple Watch</h3>

    <div class="price">₹5,000</div>

    <a class="enquire-btn"
    href="https://api.whatsapp.com/send?phone=918209989013&text=Hello%2050%20Mirars,%20I%20am%20interested%20in%20Tissot%20Gentel%20Couple%20Watch.">
    Enquire Now
    </a>
</div>

</div>

</body>
</html>
