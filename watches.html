<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watches | 50 Mirars</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f1ea;
}

/* PAGE TITLE */

.page-title{
    text-align:center;
    padding:70px 20px 50px;
}

.page-title h1{
    font-size:64px;
    margin-bottom:20px;
    color:#111;
}

.title-line{
    width:160px;
    height:2px;
    background:#c9a24d;
    margin:0 auto;
    position:relative;
}

.title-line::after{
    content:"";
    width:12px;
    height:12px;
    background:#c9a24d;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%) rotate(45deg);
}

/* PRODUCTS */

.product-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:35px;
    max-width:1400px;
    margin:auto;
    padding:20px 40px 80px;
}

.product-card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    transition:0.3s;
}

.product-card:hover{
    transform:translateY(-5px);
}

.product-card img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.product-card h3{
    font-size:28px;
    color:#111;
    margin:30px 0;
}

.enquire-btn{
    display:inline-block;
    margin-bottom:35px;
    padding:14px 35px;
    background:#c9a24d;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

.enquire-btn:hover{
    opacity:0.9;
}

/* MOBILE */

@media(max-width:768px){

    .page-title h1{
        font-size:42px;
    }

    .product-grid{
        grid-template-columns:1fr;
        padding:20px;
    }

    .product-card img{
        height:250px;
    }
}

</style>
</head>

<body>

<!-- PAGE TITLE -->

<div class="page-title">
    <h1>Watches</h1>
    <div class="title-line"></div>
</div>

<!-- PRODUCTS -->

<div class="product-grid">

    <!-- ROLEX -->

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?q=80&w=1200" alt="Rolex">

        <h3>Rolex</h3>

        <a class="enquire-btn"
           href="https://wa.me/918209989013?text=Hello%20I%20am%20interested%20in%20Rolex">
            Enquire Now
        </a>
    </div>

    <!-- TISSOT -->

    <div class="product-card">
        <img src="tissot prx.png" alt="Tissot PRX">

        <h3>Tissot PRX</h3>

        <a class="enquire-btn"
           href="https://wa.me/918209989013?text=Hello%20I%20am%20interested%20in%20Tissot%20PRX">
            Enquire Now
        </a>
    </div>

</div>

</body>
</html>
