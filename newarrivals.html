<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>New Arrivals | 50 Mirars</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f3ee;
    color:#111;
}

/* Back Button */

.back-btn{
    display:inline-block;
    margin:25px 0 0 45px;
    background:#111;
    color:#fff;
    text-decoration:none;
    padding:15px 28px;
    border-radius:8px;
    font-size:20px;
    font-weight:600;
    transition:.3s;
}

.back-btn:hover{
    background:#c9a24d;
}

/* Header Section */

.page-header{
    text-align:center;
    padding:120px 20px 80px;
}

.page-header h1{
    font-size:78px;
    font-weight:700;
    margin-bottom:25px;
}

/* Gold Divider */

.divider{
    width:200px;
    height:20px;
    margin:0 auto 35px;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:85px;
    height:2px;
    background:#c9a24d;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

.divider span{
    position:absolute;
    left:50%;
    top:50%;
    width:14px;
    height:14px;
    background:#c9a24d;
    transform:translate(-50%,-50%) rotate(45deg);
}

.page-header p{
    font-size:22px;
    color:#555;
}

/* Coming Soon Section */

.coming-soon{
    text-align:center;
    padding:40px 20px 120px;
}

.coming-soon h2{
    font-size:40px;
    color:#c9a24d;
    margin-bottom:15px;
    font-family:Georgia, serif;
}

.coming-soon p{
    font-size:20px;
    color:#666;
}

/* Mobile */

@media(max-width:768px){

.page-header{
    padding:80px 20px 50px;
}

.page-header h1{
    font-size:48px;
}

.page-header p{
    font-size:18px;
}

.back-btn{
    margin:20px;
    font-size:16px;
}

}

</style>
</head>

<body>

<a href="index.html" class="back-btn">
    ← Back to Home
</a>

<section class="page-header">

    <h1>New Arrivals</h1>

    <div class="divider">
        <span></span>
    </div>

    <p>Explore the latest additions to our collection.</p>

</section>

<section class="coming-soon">

    <h2>Coming Soon</h2>

    <p>
        Exciting new watches and luxury accessories will be added here soon.
    </p>

</section>

</body>
</html>
