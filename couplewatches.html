<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Couple Watches | 50 Mirars</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f3ee;
    color:#111;
}

/* BACK BUTTON */

.back-btn{
    display:inline-block;
    margin:30px 50px;
    background:#111;
    color:#fff;
    text-decoration:none;
    padding:14px 28px;
    border-radius:8px;
    font-weight:600;
    transition:.3s;
}

.back-btn:hover{
    background:#c9a24d;
    color:#111;
}

/* HEADER */

.page-header{
    text-align:center;
    padding:40px 20px 80px;
}

.page-header h1{
    font-size:72px;
    font-family:Georgia, serif;
    margin-bottom:20px;
}

.page-header p{
    font-size:22px;
    color:#666;
}

.divider{
    width:220px;
    margin:0 auto 25px;
    position:relative;
    height:20px;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:90px;
    height:2px;
    background:#c9a24d;
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

.divider span{
    position:absolute;
    left:50%;
    top:50%;
    width:14px;
    height:14px;
    background:#c9a24d;
    transform:translate(-50%,-50%) rotate(45deg);
}

/* PRODUCTS GRID */

.products-grid{
    width:90%;
    max-width:1400px;
    margin:auto;
    margin-bottom:100px;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:35px;
}

/* PRODUCT CARD */

.product-card{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    transition:.3s;
}

.product-card:hover{
    transform:translateY(-8px);
}

/* IMAGE SLIDER */

.slider{
    position:relative;
    width:100%;
    height:320px;
    overflow:hidden;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:.4s;
}

.slide.active{
    opacity:1;
}

.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:rgba(0,0,0,.6);
    color:#fff;
    cursor:pointer;
    z-index:10;
}

.prev{
    left:10px;
}

.next{
    right:10px;
}

.prev:hover,
.next:hover{
    background:#c9a24d;
}

/* PRODUCT INFO */

.product-info{
    padding:20px;
}

.product-info h3{
    font-size:22px;
    margin-bottom:10px;
}

.price{
    color:#c9a24d;
    font-size:30px;
    font-weight:bold;
    margin-bottom:20px;
}

.enquire-btn{
    display:block;
    text-align:center;
    background:#111;
    color:#fff;
    text-decoration:none;
    padding:14px;
    border-radius:8px;
    font-weight:600;
}

.enquire-btn:hover{
    background:#c9a24d;
    color:#111;
}

/* TABLET */

@media(max-width:1000px){

.products-grid{
    grid-template-columns:repeat(2,1fr);
}

.page-header h1{
    font-size:55px;
}

}

/* MOBILE */

@media(max-width:700px){

.products-grid{
    grid-template-columns:1fr;
}

.page-header h1{
    font-size:40px;
}

.page-header p{
    font-size:18px;
}

.back-btn{
    margin:20px;
}

}

</style>
</head>

<body>

<a href="index.html" class="back-btn">
← Back to Home
</a>

<section class="page-header">

<h1>Couple Watches</h1>

<div class="divider">
<span></span>
</div>

<p>Luxury matching watches crafted for couples.</p>

</section>

<div class="products-grid">

<!-- ADD ALL WATCHES HERE -->

</div>

<script>

document.querySelectorAll(".slider").forEach(slider=>{

const slides = slider.querySelectorAll(".slide");
const nextBtn = slider.querySelector(".next");
const prevBtn = slider.querySelector(".prev");

let current = 0;

function showSlide(index){

slides.forEach(slide=>{
slide.classList.remove("active");
});

slides[index].classList.add("active");

}

if(nextBtn){

nextBtn.addEventListener("click",()=>{

current++;

if(current >= slides.length){
current = 0;
}

showSlide(current);

});

}

if(prevBtn){

prevBtn.addEventListener("click",()=>{

current--;

if(current < 0){
current = slides.length - 1;
}

showSlide(current);

});

}

});

</script>

</body>
</html>
